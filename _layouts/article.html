---
layout: default
---

<main class="article-page">
  <div class="container">

    <a href="{{ '/#articles' | relative_url }}" class="back-link">← Back to Articles</a>

    <div class="article-header">
      <div class="article-tag">{{ page.tag }}</div>
      <h1>{{ page.title }}</h1>
      <p class="article-meta">Dean Abraham &nbsp;·&nbsp; {{ page.tag }}</p>
    </div>

    <article class="prose">
      {{ content }}
    </article>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
      // Jekyll wraps fenced ```mermaid blocks in <pre><code class="language-mermaid">
      // Transform them into <div class="mermaid"> so Mermaid.js can render them
      document.querySelectorAll('pre code.language-mermaid').forEach(el => {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.closest('pre').replaceWith(div);
      });
      await mermaid.run();
    </script>

    <section class="comments">
      <h2 class="comments-title">Comments</h2>
      <!-- Giscus comments widget                                          -->
      <script src="https://giscus.app/client.js" data-repo="DeanInMichigan/ProSite" data-repo-id="R_kgDORgWfZA"
        data-category="[ENTER CATEGORY NAME HERE]" data-category-id="[ENTER CATEGORY ID HERE]" data-mapping="pathname"
        data-strict="0" data-reactions-enabled="1" data-emit-metadata="0" data-input-position="bottom"
        data-theme="preferred_color_scheme" data-lang="en" crossorigin="anonymous" async>
        </script>
      <div class="comments-placeholder">
        <p>Comments powered by <a href="https://giscus.app" target="_blank" rel="noopener">Giscus</a>.</p>
      </div>
    </section>

  </div>
</main>
