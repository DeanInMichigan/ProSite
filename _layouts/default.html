<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" id="theme-stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <script>
    (function () {
      var cssMap = { lcars: 'lcars.css', terminal: 'terminal.css' };
      var base = document.querySelector('link#theme-stylesheet').href.replace(/style\.css$/, '');
      var theme = document.cookie.split('; ').reduce(function (acc, pair) {
        var parts = pair.split('=');
        return parts[0] === 'theme' ? parts[1] : acc;
      }, 'default');
      if (cssMap[theme]) {
        document.getElementById('theme-stylesheet').href = base + cssMap[theme];
      }
    })();
  </script>
</head>

<body>

  <nav>
    <div class="inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">deaninmichigan<span>.</span>ProSite</a>
      <div class="nav-links">
        <a href="{{ '/#about' | relative_url }}">About</a>
        <a href="{{ '/#articles' | relative_url }}">Articles</a>
        <a href="https://github.com/DeanInMichigan" target="_blank" rel="noopener">GitHub</a>
        <select id="theme-toggle" onchange="setTheme(this.value)" aria-label="Select theme">
          <option value="default">Default</option>
          <option value="lcars">LCARS</option>
          <option value="terminal">Terminal</option>
        </select>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer>
    <div class="container">
      <p>© 2026 Dean Abraham &nbsp;·&nbsp; <a href="https://github.com/DeanInMichigan/ProSite" target="_blank"
          rel="noopener">Source on GitHub</a></p>
    </div>
  </footer>

  <script>
    function getTheme() {
      return document.cookie.split('; ').reduce(function (acc, pair) {
        var parts = pair.split('=');
        return parts[0] === 'theme' ? parts[1] : acc;
      }, 'default');
    }
    function setTheme(theme) {
      var cssMap = { lcars: 'lcars.css', terminal: 'terminal.css' };
      document.cookie = 'theme=' + theme + '; path=/; max-age=31536000; SameSite=Lax';
      var link = document.getElementById('theme-stylesheet');
      var base = link.href.replace(/[^/]+\.css$/, '');
      link.href = base + (cssMap[theme] || 'style.css');
    }
    // Set correct dropdown value on load
    (function () {
      document.getElementById('theme-toggle').value = getTheme();
    })();
  </script>
</body>

</html>
